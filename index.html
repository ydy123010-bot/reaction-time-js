<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reaction Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>Reaction Lab</h1>
        </header>

        <main class="app-main">
            <section class="state" id="test-selection">
                <p class="intro">
                    Wait until the screen turns green, then tap. You have 3 rounds.
                </p>
                <button class="hover-button" id="start-button" type="button">
                    Test Your Reaction Time
                </button>
            </section>

            <section class="state hidden" id="playing-state">
                <div class="game-container">
                    <div class="game-hud">
                        <div class="hud-content" id="hud-content"></div>
                    </div>
                    <div class="game-panel-wrapper">
                        <button class="game-panel entry" id="reaction-panel" type="button">
                            <span class="panel-phase" id="panel-phase"></span>
                            <span class="panel-instruction" id="panel-instruction"></span>
                        </button>
                    </div>
                </div>
            </section>

            <section class="state hidden" id="results-state">
                <div class="stoplight-results">
                    <div class="hero-stats">
                        <div class="average-time" id="average-time"></div>
                        <p class="reaction-percentile" id="reaction-percentile"></p>
                        <p class="reaction-description" id="reaction-description"></p>
                    </div>

                    <div class="rounds">
                        <div class="round-box">
                            <div class="round-label">Round 1</div>
                            <div class="round-time" data-round-time></div>
                        </div>
                        <div class="round-box">
                            <div class="round-label">Round 2</div>
                            <div class="round-time" data-round-time></div>
                        </div>
                        <div class="round-box">
                            <div class="round-label">Round 3</div>
                            <div class="round-time" data-round-time></div>
                        </div>
                    </div>
                </div>

                <div class="results-actions">
                    <button class="hover-button" id="share-button" type="button">Share</button>
                    <button class="hover-button" id="different-test-button" type="button">Try Again</button>
                </div>
            </section>
        </main>

        <footer class="app-footer">
            <p>Reaction Lab is one of the projects students build at Aspire Coding Academy. <a
                    href="https://aspirecodingacademy.com/coding-class" target="_blank">Ready to sign up?</a></p>
        </footer>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
