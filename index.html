<body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-XXXXXXX"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div class="page-glow"></div>

    <div class="app-shell">
        <header class="hero">
            <a class="brand" href="https://aspirecodingacademy.com" target="_blank" rel="noreferrer">
                <img src="/assets/logo/white_logo_text_svg.svg" alt="Aspire Coding Academy Logo" class="logo">
            </a>

            <h1>
                <span>Reaction Lab</span>
                <span class="loader"></span>
            </h1>
            <p class="intro">
                Test your reaction time
            </p>
        </header>

        <main class="main-content">
            <section class="state state-selection" id="test-selection">
                <div class="mode-list">
                    <button class="hover-button" id="mode-stoplight" type="button" data-mode="stoplight">
                        <span class="mode-name">Stoplight</span>
                        <span class="mode-copy">3 rounds. Wait for green, then click instantly.</span>
                    </button>
                    <button class="hover-button" id="mode-whack" type="button" data-mode="whack">
                        <span class="mode-name">Whack a Pixel</span>
                        <span class="mode-copy">Tap as many pixels as you can. Careful, wrong taps cost time.</span>
                    </button>
                </div>
            </section>

            <section class="state state-playing hidden" id="playing-state"></section>

            <section class="state state-results hidden" id="results-state">
                <p class="results-label">Results</p>
                <div class="results-summary" id="results-summary"></div>
                <div class="results-actions">
                    <button class="hover-button results-button" id="retry-button" type="button">Retry</button>
                    <button class="hover-button results-button" id="different-test-button" type="button">New Test</button>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>This is one of the projects students build at Aspire Coding Academy. <a
                    href="https://aspirecodingacademy.com/coding-class" target="_blank">Ready to sign up?</a></p>
        </footer>
    </div>

    <script type="module" src="app.js"></script>
</body>
